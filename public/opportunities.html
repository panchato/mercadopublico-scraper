<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Oportunidades Compra Ágil</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --card: #16213e;
      --accent: #0f3460;
      --highlight: #e94560;
      --text: #eaeaea;
      --muted: #9fa8c3;
      --red: #e74c3c;
      --yellow: #f1c40f;
      --green: #2ecc71;
      --border: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: linear-gradient(180deg, var(--bg) 0%, #101020 100%);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
    }

    .container {
      width: min(1280px, 95vw);
      margin: 22px auto 34px;
    }

    .layout {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .sidebar {
      width: 280px;
      flex: 0 0 280px;
      position: sticky;
      top: 80px;
      align-self: flex-start;
    }

    .sidebar-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.24);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .sidebar-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sidebar-title {
      margin: 0;
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 600;
    }

    .sort-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sort-btn {
      width: 100%;
      border-radius: 8px;
      padding: 8px 12px;
      text-align: left;
      color: var(--text);
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.06);
      cursor: pointer;
      font-size: 0.9rem;
    }

    .sort-btn.active {
      background: var(--highlight);
      color: #fff;
      border-color: transparent;
    }

    .range-label {
      font-size: 0.84rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .range-input {
      width: 100%;
      accent-color: var(--highlight);
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.88rem;
      color: var(--text);
    }

    .check-row input {
      margin: 0;
      accent-color: var(--highlight);
    }

    .check-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .reset-btn {
      border-radius: 8px;
      padding: 9px 12px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      cursor: pointer;
      font-size: 0.88rem;
    }

    .reset-btn:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .main-column {
      flex: 1;
      min-width: 0;
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      padding: 16px 0 8px;
      margin-bottom: 12px;
    }

    .header.scrolled {
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 1.75rem;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .btn {
      background: var(--accent);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: var(--text);
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn:hover {
      background: #12467f;
    }

    .search-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      opacity: 0.9;
    }

    .search-input {
      width: 100%;
      background: #111a36;
      color: var(--text);
      border: 1px solid rgba(233, 69, 96, 0.4);
      border-radius: 10px;
      padding: 14px 16px 14px 38px;
      font-size: 0.95rem;
      outline: none;
    }

    .search-input:focus {
      border-color: rgba(233, 69, 96, 0.75);
      box-shadow: 0 0 0 2px rgba(233, 69, 96, 0.2);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    @media (min-width: 720px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (min-width: 1060px) {
      .grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.24);
      transition: transform 0.18s ease;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .urgency-bar {
      height: 4px;
    }

    .card-main {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .nombre {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 2.6em;
    }

    .nombre-link {
      color: inherit;
      text-decoration: none;
    }

    .nombre-link:hover {
      text-decoration: underline;
      opacity: 0.85;
    }

    .organismo {
      margin: 0;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .pill-row {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
    }

    .pill {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 0.79rem;
      white-space: nowrap;
    }

    .urgency-label {
      font-size: 0.78rem;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 999px;
      border: 1px solid currentColor;
      white-space: nowrap;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .footer-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .codigo {
      font-family: Consolas, "Courier New", monospace;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 7px;
      padding: 2px 6px;
      font-size: 0.73rem;
      color: var(--muted);
      max-width: 65%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .reliability-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      padding: 3px 8px;
      white-space: nowrap;
    }

    .reliability-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .toggle {
      background: transparent;
      color: #8dd6ff;
      border: 0;
      font-size: 0.84rem;
      cursor: pointer;
      padding: 4px 0;
    }

    .toggle:hover {
      text-decoration: underline;
    }

    .details-wrap {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.28s ease;
      border-top: 1px solid transparent;
    }

    .details-wrap.open {
      border-top-color: var(--border);
    }

    .details-inner {
      padding: 12px;
      font-size: 0.86rem;
    }

    .detail-block {
      margin: 0 0 10px;
    }

    .detail-label {
      color: var(--muted);
      font-weight: 600;
      margin-right: 6px;
    }

    .products-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 6px;
      font-size: 0.8rem;
    }

    .products-table th,
    .products-table td {
      border-bottom: 1px solid var(--border);
      text-align: left;
      padding: 6px 4px;
      vertical-align: top;
    }

    .products-table th {
      color: var(--muted);
      font-weight: 600;
    }

    .empty-message {
      text-align: center;
      color: var(--muted);
      padding: 42px 10px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.02);
    }

    .hidden {
      display: none;
    }

    @media (max-width: 767px) {
      .layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        flex: 1 1 auto;
        position: static;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-panel">
          <section class="sidebar-section">
            <h2 class="sidebar-title">Ordenar por</h2>
            <div class="sort-group">
              <button type="button" class="sort-btn active" data-sort="urgency">⏳ Caducidad</button>
              <button type="button" class="sort-btn" data-sort="amount">💰 Monto</button>
              <button type="button" class="sort-btn" data-sort="reliability">🏦 Confiabilidad</button>
            </div>
          </section>

          <section class="sidebar-section">
            <h2 class="sidebar-title">Rango de monto</h2>
            <div>
              <div class="range-label" id="montoMinLabel">Desde: CLP 0</div>
              <input id="montoMinInput" class="range-input" type="range" min="0" max="7000000" step="100000" value="0">
            </div>
            <div>
              <div class="range-label" id="montoMaxLabel">Hasta: CLP 7.000.000</div>
              <input id="montoMaxInput" class="range-input" type="range" min="0" max="7000000" step="100000" value="7000000">
            </div>
          </section>

          <section class="sidebar-section">
            <h2 class="sidebar-title">Confiabilidad del comprador</h2>
            <label class="check-row"><input type="checkbox" class="reliability-check" value="Muy confiable" checked><span class="check-dot" style="background:#2ecc71"></span>Muy confiable</label>
            <label class="check-row"><input type="checkbox" class="reliability-check" value="Confiable" checked><span class="check-dot" style="background:#2ecc71"></span>Confiable</label>
            <label class="check-row"><input type="checkbox" class="reliability-check" value="Precaución" checked><span class="check-dot" style="background:#f1c40f"></span>Precaución</label>
            <label class="check-row"><input type="checkbox" class="reliability-check" value="Riesgo" checked><span class="check-dot" style="background:#e74c3c"></span>Riesgo</label>
            <label class="check-row"><input type="checkbox" class="reliability-check" value="Evitar" checked><span class="check-dot" style="background:#e74c3c"></span>Evitar</label>
            <label class="check-row"><input type="checkbox" class="reliability-check" value="Sin datos" checked><span class="check-dot" style="background:#9fa8c3"></span>Sin datos</label>
          </section>

          <button id="resetFiltersBtn" type="button" class="reset-btn">Restablecer filtros</button>
        </div>
      </aside>

      <main class="main-column">
        <header class="header" id="stickyHeader">
          <div>
            <h1>Oportunidades Compra Ágil</h1>
            <p class="subtitle" id="subtitle">0 de 0 oportunidades · fuente: sin datos</p>
          </div>
          <a class="btn" href="/">← Panel técnico</a>
        </header>

        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input id="searchInput" class="search-input" type="text" placeholder="Buscar por nombre u organismo...">
        </div>

        <div id="resultsGrid" class="grid"></div>
        <div id="noResults" class="empty-message hidden">No hay resultados para tu búsqueda</div>
        <div id="emptyState" class="empty-message hidden">No hay oportunidades disponibles. Ejecuta el scraper desde el panel técnico.</div>
      </main>
    </div>
  </div>

  <script>
    const subtitleEl = document.getElementById('subtitle');
    const searchInputEl = document.getElementById('searchInput');
    const resultsGridEl = document.getElementById('resultsGrid');
    const noResultsEl = document.getElementById('noResults');
    const emptyStateEl = document.getElementById('emptyState');
    const stickyHeaderEl = document.getElementById('stickyHeader');
    const sortButtons = Array.from(document.querySelectorAll('.sort-btn'));
    const montoMinInputEl = document.getElementById('montoMinInput');
    const montoMaxInputEl = document.getElementById('montoMaxInput');
    const montoMinLabelEl = document.getElementById('montoMinLabel');
    const montoMaxLabelEl = document.getElementById('montoMaxLabel');
    const reliabilityCheckboxEls = Array.from(document.querySelectorAll('.reliability-check'));
    const resetFiltersBtnEl = document.getElementById('resetFiltersBtn');

    let allOpportunities = [];
    let sourceName = 'sin archivo';

    const state = {
      sortBy: 'urgency',
      montoMin: 0,
      montoMax: 7000000,
      searchTerm: '',
      reliabilityLabels: new Set(['Muy confiable', 'Confiable', 'Precaución', 'Riesgo', 'Evitar', 'Sin datos'])
    };

    function parseDate(value) {
      if (!value) return null;
      const parsed = new Date(value);
      return Number.isNaN(parsed.getTime()) ? null : parsed;
    }

    function formatDate(value) {
      const parsed = parseDate(value);
      if (!parsed) return 'Sin fecha';
      const date = parsed.toLocaleDateString('es-CL', {
        day: '2-digit', month: '2-digit', year: 'numeric'
      });
      const time = parsed.toLocaleTimeString('es-CL', {
        hour: '2-digit', minute: '2-digit', hour12: false
      });
      return `${date} ${time}`;
    }

    function formatMoney(value) {
      const amount = Number(value);
      if (!Number.isFinite(amount)) return 'CLP 0';
      return `CLP ${new Intl.NumberFormat('es-CL').format(Math.round(amount))}`;
    }

    function getUrgency(fechaCierre) {
      const now = new Date();
      const closeDate = parseDate(fechaCierre);

      if (!closeDate) {
        return { color: '#2ecc71', label: 'Sin fecha' };
      }

      // Reference points
      const tomorrowNoon = new Date(now);
      tomorrowNoon.setDate(tomorrowNoon.getDate() + 1);
      tomorrowNoon.setHours(12, 0, 0, 0);

      const dayAfterTomorrowStart = new Date(now);
      dayAfterTomorrowStart.setDate(dayAfterTomorrowStart.getDate() + 2);
      dayAfterTomorrowStart.setHours(0, 0, 0, 0);

      // Label calculation (still based on calendar days for display)
      const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
      const startOfCloseDay = new Date(closeDate.getFullYear(), closeDate.getMonth(), closeDate.getDate()).getTime();
      const dayDelta = Math.round((startOfCloseDay - startOfToday) / (1000 * 60 * 60 * 24));

      let label;
      if (dayDelta <= 0) label = 'HOY';
      else if (dayDelta === 1) label = 'MAÑANA';
      else label = `${dayDelta} días`;

      // Color based on exact closing time
      if (closeDate <= tomorrowNoon) {
        return { color: '#e74c3c', label }; // red: closes today or before tomorrow noon
      }
      if (closeDate < dayAfterTomorrowStart) {
        return { color: '#f1c40f', label }; // yellow: closes tomorrow after noon
      }
      return { color: '#2ecc71', label }; // green: closes day after tomorrow or later
    }

    function getReliabilityColor(label) {
      if (label === 'Muy confiable' || label === 'Confiable') return '#2ecc71';
      if (label === 'Precaución') return '#f1c40f';
      if (label === 'Riesgo' || label === 'Evitar') return '#e74c3c';
      return '#9fa8c3';
    }

    function getProducts(opportunity) {
      if (Array.isArray(opportunity?.detalle?.productos)) return opportunity.detalle.productos;
      if (Array.isArray(opportunity?.productos)) return opportunity.productos;
      return [];
    }

    function getInstitution(opportunity) {
      if (opportunity?.detalle?.institucion) return opportunity.detalle.institucion;
      if (opportunity?.institucion) return opportunity.institucion;
      return null;
    }

    function createProductsSection(products) {
      if (!products.length) {
        return '<div class="detail-block">Sin detalle de productos</div>';
      }

      const rows = products.map((product) => {
        const nombre = product?.nombre || product?.descripcion || 'Sin nombre';
        const cantidad = product?.cantidad ?? '-';
        const unidad = product?.unidad?.nombre || '-';
        return `
          <tr>
            <td>${escapeHtml(String(nombre))}</td>
            <td>${escapeHtml(String(cantidad))}</td>
            <td>${escapeHtml(String(unidad))}</td>
          </tr>
        `;
      }).join('');

      return `
        <table class="products-table">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Cantidad</th>
              <th>Unidad</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function escapeHtml(value) {
      return value
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderOpportunityCard(opportunity) {
      const nombre = opportunity?.nombre || 'Sin nombre';
      const organismo = opportunity?.organismo || opportunity?.institucion?.empresa || 'Organismo no informado';
      const fechaCierre = opportunity?.fechaCierre;
      const urgency = getUrgency(fechaCierre);
      const codigo = opportunity?.codigo || 'sin-codigo';
      const resumenUrl = `https://compra-agil.mercadopublico.cl/resumen-cotizacion/${encodeURIComponent(String(codigo))}`;
      const montoDisponible = opportunity?.montoDisponible ?? opportunity?.detalle?.montoMoneda ?? opportunity?.montoMoneda ?? 0;
      const buyerReliability = opportunity?.buyerReliability || null;
      const reliabilityColor = getReliabilityColor(buyerReliability?.label);

      const descripcion = opportunity?.detalle?.descripcion || opportunity?.descripcion || '';
      const plazoEntrega = opportunity?.detalle?.plazoEntrega || opportunity?.plazoEntrega || 'No informado';
      const direccion = opportunity?.detalle?.direccion || opportunity?.direccion || '';
      const institucion = getInstitution(opportunity);
      const products = getProducts(opportunity);
      const reliabilityPill = buyerReliability
        ? `🏦 ${buyerReliability.label} (${buyerReliability.ratioPercent})`
        : '';
      const reliabilityDetail = buyerReliability
        ? `
            <div class="detail-block">
              <span class="detail-label">Confiabilidad del comprador:</span>
              <div>Reclamos pago no oportuno: ${escapeHtml(new Intl.NumberFormat('es-CL').format(Number(buyerReliability.pagoNoOportuno) || 0))} de ${escapeHtml(new Intl.NumberFormat('es-CL').format(Number(buyerReliability.totalOrdenes) || 0))} órdenes (${escapeHtml(String(buyerReliability.ratioPercent || '0%'))})</div>
              <div>Puntaje: ${escapeHtml(String(buyerReliability.score || 0))}/25</div>
            </div>
          `
        : '';
      const institutionLine = institucion
        ? `${institucion.empresa || 'Sin empresa'}${institucion.rut ? ` (${institucion.rut})` : ''}`
        : 'No informada';

      const card = document.createElement('article');
      card.className = 'card';
      card.dataset.search = `${String(nombre)} ${String(organismo)}`.toLowerCase();

      card.innerHTML = `
        <div class="urgency-bar" style="background:${urgency.color};"></div>
        <div class="card-main">
          <h3 class="nombre" title="${escapeHtml(String(nombre))}"><a class="nombre-link" href="${escapeHtml(resumenUrl)}" target="_blank" rel="noopener noreferrer">${escapeHtml(String(nombre))}</a></h3>
          <p class="organismo">${escapeHtml(String(organismo))}</p>
          <div class="pill-row">
            <span class="pill">💰 ${escapeHtml(formatMoney(montoDisponible))}</span>
            <span class="pill">📅 Cierra: ${escapeHtml(formatDate(fechaCierre))}</span>
            <span class="urgency-label" style="color:${urgency.color};">${escapeHtml(urgency.label)}</span>
            ${buyerReliability ? `<span class="pill">${escapeHtml(reliabilityPill)}</span>` : ''}
          </div>
          <div class="card-footer">
            <div class="footer-meta">
              <span class="codigo">${escapeHtml(String(codigo))}</span>
              ${buyerReliability ? `<span class="reliability-badge"><span class="reliability-dot" style="background:${reliabilityColor};"></span>${escapeHtml(String(buyerReliability.label))}</span>` : ''}
            </div>
            <button type="button" class="toggle">Ver detalle ▾</button>
          </div>
        </div>
        <div class="details-wrap">
          <div class="details-inner">
            ${descripcion ? `<div class="detail-block"><span class="detail-label">Descripción:</span>${escapeHtml(String(descripcion))}</div>` : ''}
            <div class="detail-block"><span class="detail-label">Plazo de entrega:</span>${escapeHtml(String(plazoEntrega))}</div>
            ${direccion ? `<div class="detail-block"><span class="detail-label">Dirección:</span>${escapeHtml(String(direccion))}</div>` : ''}
            <div class="detail-block">
              <span class="detail-label">Productos:</span>
              ${createProductsSection(products)}
            </div>
            ${reliabilityDetail}
            <div class="detail-block"><span class="detail-label">Institución:</span>${escapeHtml(institutionLine)}</div>
          </div>
        </div>
      `;

      const toggleBtn = card.querySelector('.toggle');
      const detailsWrap = card.querySelector('.details-wrap');

      toggleBtn.addEventListener('click', () => {
        const isOpen = detailsWrap.classList.toggle('open');
        if (isOpen) {
          detailsWrap.style.maxHeight = `${detailsWrap.scrollHeight}px`;
          toggleBtn.textContent = 'Ver detalle ▴';
        } else {
          detailsWrap.style.maxHeight = '0px';
          toggleBtn.textContent = 'Ver detalle ▾';
        }
      });

      return card;
    }

    function renderCards(opportunities) {
      resultsGridEl.innerHTML = '';
      for (const opportunity of opportunities) {
        resultsGridEl.appendChild(renderOpportunityCard(opportunity));
      }
    }

    function getClosingTimestamp(opportunity) {
      const parsed = parseDate(opportunity?.fechaCierre);
      return parsed ? parsed.getTime() : null;
    }

    function updateSubtitle(filteredCount) {
      subtitleEl.textContent = `${filteredCount} de ${allOpportunities.length} oportunidades · fuente: ${sourceName}`;
    }

    function updateMontoLabels() {
      montoMinLabelEl.textContent = `Desde: ${formatMoney(state.montoMin)}`;
      montoMaxLabelEl.textContent = `Hasta: ${formatMoney(state.montoMax)}`;
    }

    function updateSortButtons() {
      for (const btn of sortButtons) {
        btn.classList.toggle('active', btn.dataset.sort === state.sortBy);
      }
    }

    function applyFiltersAndSort() {
      const filtered = allOpportunities.filter((opportunity) => {
        const nombre = String(opportunity?.nombre || '');
        const organismo = String(opportunity?.organismo || opportunity?.institucion?.empresa || '');
        const haystack = `${nombre} ${organismo}`.toLowerCase();
        const searchMatch = !state.searchTerm || haystack.includes(state.searchTerm);

        const montoDisponible = Number(opportunity?.montoDisponible ?? opportunity?.detalle?.montoMoneda ?? opportunity?.montoMoneda ?? 0);
        const safeMonto = Number.isFinite(montoDisponible) ? montoDisponible : 0;
        const montoMatch = safeMonto >= state.montoMin && safeMonto <= state.montoMax;

        const reliabilityLabel = opportunity?.buyerReliability?.label || 'Sin datos';
        const reliabilityMatch = state.reliabilityLabels.has(reliabilityLabel);

        return searchMatch && montoMatch && reliabilityMatch;
      });

      filtered.sort((a, b) => {
        if (state.sortBy === 'amount') {
          const aMonto = Number(a?.montoDisponible ?? a?.detalle?.montoMoneda ?? a?.montoMoneda ?? 0) || 0;
          const bMonto = Number(b?.montoDisponible ?? b?.detalle?.montoMoneda ?? b?.montoMoneda ?? 0) || 0;
          return bMonto - aMonto;
        }

        if (state.sortBy === 'reliability') {
          const aScore = Number(a?.buyerReliability?.score ?? -1);
          const bScore = Number(b?.buyerReliability?.score ?? -1);
          if (bScore !== aScore) return bScore - aScore;
        }

        const aTs = getClosingTimestamp(a);
        const bTs = getClosingTimestamp(b);
        if (aTs === null && bTs === null) return 0;
        if (aTs === null) return 1;
        if (bTs === null) return -1;
        return aTs - bTs;
      });

      renderCards(filtered);
      updateSubtitle(filtered.length);

      if (allOpportunities.length === 0) {
        noResultsEl.classList.add('hidden');
        emptyStateEl.classList.remove('hidden');
        return;
      }

      emptyStateEl.classList.add('hidden');
      noResultsEl.classList.toggle('hidden', filtered.length > 0);
    }

    function resetFilters() {
      state.sortBy = 'urgency';
      state.montoMin = 0;
      state.montoMax = 7000000;
      state.searchTerm = '';
      state.reliabilityLabels = new Set(['Muy confiable', 'Confiable', 'Precaución', 'Riesgo', 'Evitar', 'Sin datos']);

      searchInputEl.value = '';
      montoMinInputEl.value = String(state.montoMin);
      montoMaxInputEl.value = String(state.montoMax);
      updateMontoLabels();
      updateSortButtons();

      for (const checkbox of reliabilityCheckboxEls) {
        checkbox.checked = true;
      }

      applyFiltersAndSort();
    }

    async function loadOpportunities() {
      try {
        const response = await fetch('/api/opportunities/latest');
        const data = await response.json();
        allOpportunities = Array.isArray(data?.opportunities) ? data.opportunities : [];
        sourceName = data?.source || 'sin archivo';
      } catch (error) {
        allOpportunities = [];
        sourceName = 'error de carga';
      }

      applyFiltersAndSort();
    }

    window.addEventListener('scroll', () => {
      stickyHeaderEl.classList.toggle('scrolled', window.scrollY > 2);
    });

    for (const btn of sortButtons) {
      btn.addEventListener('click', () => {
        state.sortBy = btn.dataset.sort;
        updateSortButtons();
        applyFiltersAndSort();
      });
    }

    montoMinInputEl.addEventListener('input', () => {
      state.montoMin = Number(montoMinInputEl.value);
      if (state.montoMin > state.montoMax) {
        state.montoMax = state.montoMin;
        montoMaxInputEl.value = String(state.montoMax);
      }
      updateMontoLabels();
      applyFiltersAndSort();
    });

    montoMaxInputEl.addEventListener('input', () => {
      state.montoMax = Number(montoMaxInputEl.value);
      if (state.montoMax < state.montoMin) {
        state.montoMin = state.montoMax;
        montoMinInputEl.value = String(state.montoMin);
      }
      updateMontoLabels();
      applyFiltersAndSort();
    });

    for (const checkbox of reliabilityCheckboxEls) {
      checkbox.addEventListener('change', () => {
        if (checkbox.checked) {
          state.reliabilityLabels.add(checkbox.value);
        } else {
          state.reliabilityLabels.delete(checkbox.value);
        }
        applyFiltersAndSort();
      });
    }

    searchInputEl.addEventListener('input', () => {
      state.searchTerm = searchInputEl.value.trim().toLowerCase();
      applyFiltersAndSort();
    });

    resetFiltersBtnEl.addEventListener('click', resetFilters);

    updateMontoLabels();
    updateSortButtons();
    loadOpportunities();
  </script>
</body>
</html>
